<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Сайт временно недоступен. Ведутся технические работы.</title>
  <meta name="description" content="Сайт временно недоступен. Ведутся технические работы." />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="yandex" content="noindex, nofollow" />
  <meta name="googlebot" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      color: #e6ecf3;
      background:
        radial-gradient(1200px 600px at 80% -10%, rgba(255,122,26,0.18), transparent 60%),
        radial-gradient(900px 500px at -10% 110%, rgba(255,122,26,0.12), transparent 60%),
        #0a0d11;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.5;
    }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }
    .card {
      width: 100%;
      max-width: 640px;
      text-align: center;
    }
    .logo {
      width: 96px;
      height: 96px;
      margin: 0 auto 24px;
      display: block;
    }
    .badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(255,122,26,0.12);
      color: #ff9a4a;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    h1 {
      margin: 0 0 16px;
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 800;
      line-height: 1.15;
      color: #ffffff;
    }
    p.lead {
      margin: 0 0 28px;
      font-size: clamp(15px, 2vw, 17px);
      color: #b6c0cd;
    }
    .contacts {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    .contact {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: #e6ecf3;
      font-size: 15px;
      font-weight: 500;
      transition: background .15s ease, border-color .15s ease;
    }
    .contact:hover { background: rgba(255,122,26,0.10); border-color: rgba(255,122,26,0.35); }
    .contact svg { flex-shrink: 0; }
    footer {
      padding: 20px 24px;
      text-align: center;
      color: #6b7682;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <img class="logo" src="./assets/logo.png" alt="GERMERIDE" />
      <span class="badge">Технические работы</span>
      <h1>Сайт временно недоступен</h1>
      <p class="lead">Мы обновляем сайт. Пожалуйста, загляните чуть позже — а пока с нами можно связаться напрямую.</p>
      <div class="contacts">
        <a class="contact" href="tel:+74951234567">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.72 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.35 1.85.59 2.81.72A2 2 0 0 1 22 16.92Z" stroke="#ff7a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>+7 (495) 123-45-67</span>
        </a>
        <a class="contact" href="mailto:info@npomsk.ru">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2Z" stroke="#ff7a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="m22 6-10 7L2 6" stroke="#ff7a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>info@npomsk.ru</span>
        </a>
      </div>
    </div>
  </main>
  <footer>&copy; <span id="y"></span> GERMERIDE</footer>
  <script>document.getElementById('y').textContent = new Date().getFullYear();</script>
</body>
</html>
